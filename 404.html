<!doctype html>
<html lang="it">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'" />
	<meta name="theme-color" content="#0d0f15" />
	<link rel="manifest" href="manifest.json" />
	<link rel="icon" href="favicon.svg" type="image/svg+xml" />
	<link rel="apple-touch-icon" href="apple-touch-icon.png" />
	<title>Pagina non trovata | DailyBriefing</title>
	<style>
		:root {
			--bg: #0f1117;
			--card: #1a1d27;
			--t1: #e2e8f0;
			--t2: #94a3b8;
			--acc: #7c9ef8;
			--acc2: #a5b9ff;
			--brd: #2d3148;
			--r: 12px;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: var(--bg);
			color: var(--t1);
			font-family:
				system-ui,
				-apple-system,
				sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 1.5rem;
		}

		.box {
			text-align: center;
			max-width: 420px;
			padding: 2rem;
		}

		.code {
			font-size: 4rem;
			font-weight: 800;
			color: var(--brd);
			line-height: 1;
			margin-bottom: 0.5rem;
		}

		h1 {
			font-size: 1.3rem;
			font-weight: 700;
			margin-bottom: 0.75rem;
		}

		p {
			font-size: 0.88rem;
			color: var(--t2);
			line-height: 1.6;
			margin-bottom: 1.5rem;
		}

		.btn-group {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			align-items: center;
		}

		.btn-group a {
			display: inline-flex;
			align-items: center;
			gap: 0.4rem;
			padding: 0.5rem 1.25rem;
			border-radius: 8px;
			text-decoration: none;
			font-size: 0.82rem;
			font-weight: 600;
			transition: all 0.15s;
		}

		.btn-primary {
			background: var(--acc);
			color: var(--bg);
		}

		.btn-primary:hover {
			background: var(--acc2);
		}

		.btn-secondary {
			border: 1px solid var(--brd);
			color: var(--t2);
		}

		.btn-secondary:hover {
			border-color: var(--acc);
			color: var(--acc);
		}
	</style>
</head>

<body>
	<div class="box">
		<div class="code">404</div>
		<h1>Pagina non trovata</h1>
		<p>Il report richiesto non esiste o non è ancora stato generato.</p>
		<div class="btn-group">
			<a href="index.html" class="btn-primary">Torna alla Home</a>
			<a href="dashboard.html" class="btn-secondary">Dashboard</a>
		</div>
	</div>
	<script src="nav.js"></script>
	<script src="shared.js"></script>
</body>

</html>
